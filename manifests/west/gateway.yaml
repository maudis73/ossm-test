apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-ingress
  namespace: istio-ingress
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      hostname: west-ingress.example.com
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
