# North-south Gateway API ingress on West — symmetrical to manifests/east/.
# Namespace istio-injection enables the managed gateway workload (west-ingress-istio).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: west-ingress
resources:
  - namespace.yaml
  - gateway.yaml
  - httpbin.yaml
  - httproute.yaml
