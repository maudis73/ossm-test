apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: west-ingress-route
  namespace: west-ingress
spec:
  parentRefs:
    - name: west-ingress
      namespace: west-ingress
  hostnames:
    - west-ingress.example.com
  rules:
    # One path per rule: multiple matches in the same rule are ANDed (all must match).
    - matches:
        - path:
            type: PathPrefix
            value: /status
      backendRefs:
        - name: httpbin
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /headers
      backendRefs:
        - name: httpbin
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /hello
      backendRefs:
        - group: ""
          kind: Service
          name: helloworld
          namespace: sample
          port: 5000
